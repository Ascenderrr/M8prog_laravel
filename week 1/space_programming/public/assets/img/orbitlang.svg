<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="orbitGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E3A5F"/>
      <stop offset="100%" stop-color="#0D1B2A"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect x="10" y="10" width="180" height="180" rx="15" fill="url(#orbitGrad)" stroke="#00D4FF" stroke-width="2"/>
  <circle cx="100" cy="90" r="12" fill="#00D4FF" opacity="0.8"/>
  <ellipse cx="100" cy="90" rx="50" ry="25" fill="none" stroke="#00D4FF" stroke-width="1.5" opacity="0.6"/>
  <ellipse cx="100" cy="90" rx="70" ry="35" fill="none" stroke="#0088CC" stroke-width="1" opacity="0.4"/>
  <circle cx="150" cy="90" r="5" fill="#FFD700" filter="url(#glow2)"/>
  <circle cx="50" cy="90" r="4" fill="#FF6B6B" filter="url(#glow2)"/>
  <text x="100" y="145" text-anchor="middle" fill="#00D4FF" font-family="monospace" font-size="14" font-weight="bold">orbit&gt;</text>
  <text x="100" y="165" text-anchor="middle" fill="#0088CC" font-family="monospace" font-size="10">launch_trajectory()</text>
</svg>
