<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="astroGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2D1B69"/>
      <stop offset="100%" stop-color="#0F0A1A"/>
    </radialGradient>
    <filter id="glow3">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <circle cx="100" cy="100" r="85" fill="url(#astroGrad)" stroke="#9B59B6" stroke-width="2"/>
  <circle cx="100" cy="100" r="60" fill="none" stroke="#8E44AD" stroke-width="1" opacity="0.3"/>
  <circle cx="100" cy="100" r="40" fill="none" stroke="#9B59B6" stroke-width="1" opacity="0.5"/>
  <line x1="100" y1="40" x2="100" y2="160" stroke="#E8D5B7" stroke-width="1" opacity="0.4"/>
  <line x1="40" y1="100" x2="160" y2="100" stroke="#E8D5B7" stroke-width="1" opacity="0.4"/>
  <line x1="58" y1="58" x2="142" y2="142" stroke="#E8D5B7" stroke-width="0.5" opacity="0.3"/>
  <line x1="142" y1="58" x2="58" y2="142" stroke="#E8D5B7" stroke-width="0.5" opacity="0.3"/>
  <polygon points="100,60 105,75 100,70 95,75" fill="#FFD700" filter="url(#glow3)"/>
  <circle cx="70" cy="70" r="3" fill="#FFFFFF" filter="url(#glow3)"/>
  <circle cx="130" cy="80" r="2.5" fill="#87CEEB" filter="url(#glow3)"/>
  <circle cx="85" cy="130" r="2" fill="#FFB6C1" filter="url(#glow3)"/>
  <circle cx="125" cy="120" r="3.5" fill="#98FB98" filter="url(#glow3)"/>
  <circle cx="100" cy="100" r="5" fill="#E8D5B7"/>
  <text x="100" y="180" text-anchor="middle" fill="#9B59B6" font-family="monospace" font-size="10" font-weight="bold">@pulsar定位</text>
</svg>
