<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="nebulaGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4A90D9"/>
      <stop offset="50%" stop-color="#2E5AA0"/>
      <stop offset="100%" stop-color="#1A1A4E"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <circle cx="100" cy="100" r="80" fill="url(#nebulaGrad)" stroke="#6BB5FF" stroke-width="2"/>
  <ellipse cx="100" cy="100" rx="60" ry="20" fill="none" stroke="#6BB5FF" stroke-width="1.5" opacity="0.6" transform="rotate(-20 100 100)"/>
  <ellipse cx="100" cy="100" rx="45" ry="15" fill="none" stroke="#8ECAE6" stroke-width="1" opacity="0.4" transform="rotate(15 100 100)"/>
  <circle cx="75" cy="85" r="4" fill="#FFD700" filter="url(#glow)"/>
  <circle cx="120" cy="110" r="3" fill="#FF6B6B" filter="url(#glow)"/>
  <circle cx="90" cy="120" r="2" fill="#FFFFFF" filter="url(#glow)"/>
  <circle cx="130" cy="80" r="2.5" fill="#90EE90" filter="url(#glow)"/>
  <text x="100" y="170" text-anchor="middle" fill="#6BB5FF" font-family="monospace" font-size="12" font-weight="bold">{"nft"}</text>
</svg>
